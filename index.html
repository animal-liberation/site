<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centre for Animal Freedom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #ddeef7;
      color: #111111;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    main {
      text-align: center;
      max-width: 680px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: 0.02em;
      line-height: 1.15;
      margin-bottom: 1.25rem;
    }

    p.tagline {
      font-weight: 300;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      letter-spacing: 0.03em;
      line-height: 1.6;
      color: #2a2a2a;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555555;
    }
  </style>
</head>
<body>
  <main>
    <h1>Centre for Animal Freedom</h1>
    <p class="tagline">Facilitating animal liberation through research and movement building</p>
  </main>
  <footer>Coming soon.</footer>
</body>
</html>
